# Enterprise Knowledge Brain — 基础设施
# ─────────────────────────────────────────────────────────────────────────────
# 快速启动（仅验证 Neo4j）:
#   docker-compose up neo4j -d
#
# 完整启动（Neo4j + Milvus 全栈）:
#   docker-compose up -d
#
# 查看状态:
#   docker-compose ps
#   docker-compose logs -f milvus-standalone
# ─────────────────────────────────────────────────────────────────────────────

services:

  app:
    build: .
    container_name: ekb_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    environment:
      APP_PROFILE: ${APP_PROFILE:-demo}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      MILVUS_HOST: milvus-standalone
      REDIS_URL: redis://redis:6379/0
      MCP_API_SERVER_URL: http://mcp-api:8001/mcp
      MCP_SQL_SERVER_URL: http://mcp-sql:8002/mcp
      MCP_GRAPHRAG_SERVER_URL: http://mcp-graphrag:8003/mcp
      MCP_DATA_ANALYSIS_SERVER_URL: http://mcp-data-analysis:8004/mcp
      MCP_WEB_SEARCH_SERVER_URL: http://mcp-web-search:8005/mcp
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      mcp-api:
        condition: service_healthy
      mcp-sql:
        condition: service_healthy
      mcp-graphrag:
        condition: service_healthy
      mcp-data-analysis:
        condition: service_healthy
      mcp-web-search:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  mcp-api:
    build: .
    container_name: ekb_mcp_api
    command: python -m mcp_servers.api_server
    env_file:
      - path: .env
        required: false
    environment:
      APP_PROFILE: ${APP_PROFILE:-demo}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
    ports:
      - "8001:8001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  mcp-sql:
    build: .
    container_name: ekb_mcp_sql
    command: python -m mcp_servers.sql_server
    env_file:
      - path: .env
        required: false
    environment:
      APP_PROFILE: ${APP_PROFILE:-demo}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
    ports:
      - "8002:8002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  mcp-graphrag:
    build: .
    container_name: ekb_mcp_graphrag
    command: python -m mcp_servers.graphrag_server
    env_file:
      - path: .env
        required: false
    environment:
      APP_PROFILE: ${APP_PROFILE:-demo}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      NEO4J_URI: bolt://neo4j:7687
      MILVUS_HOST: milvus-standalone
    ports:
      - "8003:8003"
    depends_on:
      neo4j:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  mcp-data-analysis:
    build: .
    container_name: ekb_mcp_data_analysis
    command: python -m mcp_servers.data_analysis_server
    env_file:
      - path: .env
        required: false
    environment:
      APP_PROFILE: ${APP_PROFILE:-demo}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
    ports:
      - "8004:8004"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  mcp-web-search:
    build: .
    container_name: ekb_mcp_web_search
    command: python -m mcp_servers.web_search_server
    env_file:
      - path: .env
        required: false
    environment:
      APP_PROFILE: ${APP_PROFILE:-demo}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?set DEEPSEEK_API_KEY}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
    ports:
      - "8005:8005"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ── Neo4j 图数据库 ──────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19-community
    container_name: ekb_neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}
      # 允许通过浏览器访问：http://localhost:7474
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt 协议（Python driver 使用）
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis（会话记忆/缓存，多 Agent 后期使用）────────────────────────────────
  redis:
    image: redis/redis-stack-server:latest
    container_name: ekb_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── etcd（Milvus 元数据存储）────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: ekb_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: >
      etcd
      --advertise-client-urls=http://127.0.0.1:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    restart: unless-stopped

  # ── MinIO（Milvus 对象存储）─────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: ekb_minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/data
    command: minio server /data --console-address ":9001"
    ports:
      - "9001:9001"   # MinIO Web Console（可选）
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ── Milvus Standalone 向量数据库 ─────────────────────────────────────────────
  milvus-standalone:
    image: milvusdb/milvus:v2.4.5
    container_name: ekb_milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"  # SDK gRPC 端口（Python pymilvus 连接此端口）
      - "9091:9091"    # HTTP metrics
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
